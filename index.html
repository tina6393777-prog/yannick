<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>亞尼克YTM客服助手</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --brand: #C8102E;
  --brand-dark: #A00D24;
  --brand-light: #E8847A;
  --brand-bg: #FFF5F5;
  --success: #2D9F60;
  --text: #2C2C2C;
  --text-light: #6B6B6B;
  --border: #E8E0E0;
  --bg: #FAF7F5;
  --white: #FFFFFF;
  --shadow: 0 2px 8px rgba(200,16,46,0.08);
  --shadow-hover: 0 6px 20px rgba(200,16,46,0.15);
  --radius: 12px;
  --fs: 16px;
}
html { font-size: var(--fs); }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Microsoft JhengHei", "PingFang TC", "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  padding-bottom: 40px;
}

/* ========= Header with LOGO ========= */
.header {
  background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
  color: var(--white);
  padding: 16px;
  box-shadow: 0 4px 12px rgba(200,16,46,0.2);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}
.logo-box {
  background: var(--white);
  border-radius: 10px;
  padding: 8px 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  flex-shrink: 0;
}
.logo-svg { height: 38px; width: auto; display: block; }

.header-center {
  flex: 1;
  min-width: 180px;
}
.header h1 {
  font-size: 1.25rem;
  margin-bottom: 4px;
  letter-spacing: 1px;
  font-weight: 700;
}
.header-contact {
  font-size: 0.8rem;
  opacity: 0.95;
  line-height: 1.6;
}
.header-contact div { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
.header-contact strong { color: #FFE082; margin-right: 4px; }

.header-actions {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}
.btn-icon {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  color: var(--white);
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  font-family: inherit;
}
.btn-icon:hover { background: rgba(255,255,255,0.28); }

@media (max-width: 640px) {
  .header-inner { gap: 10px; }
  .header h1 { font-size: 1.05rem; }
  .header-contact { font-size: 0.72rem; }
  .logo-svg { height: 32px; }
  .btn-icon { padding: 5px 10px; font-size: 0.75rem; }
}

/* ========= Marquee ========= */
.marquee-wrap {
  background: #FFF8E1;
  border-bottom: 1px solid #F5D98E;
  overflow: hidden;
  padding: 8px 0;
}
.marquee {
  display: inline-block;
  white-space: nowrap;
  animation: marquee 40s linear infinite;
  font-size: 0.85rem;
  color: #8B4513;
}
@keyframes marquee {
  0% { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}

.container { max-width: 1200px; margin: 0 auto; padding: 16px; }

/* ========= Update Banner ========= */
.update-banner {
  background: #E8F5E9;
  border: 1px solid #81C784;
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 14px;
  display: none;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
  font-size: 0.9rem;
  color: #1B5E20;
}
.update-banner.show { display: flex; }
.update-banner button {
  background: #2E7D32;
  color: #fff;
  border: none;
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.85rem;
  font-family: inherit;
}

/* ========= Search ========= */
.search-box {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}
.search-box input {
  flex: 1;
  border: none;
  outline: none;
  font-size: 1rem;
  color: var(--text);
  background: transparent;
  padding: 4px 0;
  font-family: inherit;
}
.search-icon { color: var(--brand); font-size: 1.2rem; }
.search-clear {
  background: var(--border);
  border: none;
  border-radius: 50%;
  width: 24px; height: 24px;
  font-size: 0.8rem;
  cursor: pointer;
  color: var(--text-light);
  display: none;
}
.search-clear.show { display: block; }

/* ========= Categories ========= */
.categories {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}
@media (max-width: 768px) { .categories { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 480px) { .categories { grid-template-columns: repeat(2, 1fr); } }

.category-card {
  background: var(--white);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 8px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.category-card:hover {
  border-color: var(--brand);
  transform: translateY(-2px);
  box-shadow: var(--shadow-hover);
}
.category-card.active {
  background: var(--brand);
  color: var(--white);
  border-color: var(--brand);
}
.category-card .icon { font-size: 2rem; display: block; margin-bottom: 6px; }
.category-card .name { font-size: 0.9rem; font-weight: 600; }
.category-card .count {
  position: absolute;
  top: 6px; right: 8px;
  background: var(--brand);
  color: var(--white);
  font-size: 0.7rem;
  padding: 2px 8px;
  border-radius: 12px;
  font-weight: 600;
}
.category-card.active .count { background: var(--white); color: var(--brand); }

/* ========= Section Title ========= */
.section-title {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--brand);
  margin: 16px 0 12px;
  padding-left: 12px;
  border-left: 4px solid var(--brand);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}
.section-title .count-badge {
  font-size: 0.8rem;
  color: var(--text-light);
  font-weight: 500;
}

/* ========= QA Cards ========= */
.qa-list { display: flex; flex-direction: column; gap: 12px; }
.qa-card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 1px solid var(--border);
  transition: all 0.2s;
}
.qa-card:hover { box-shadow: var(--shadow-hover); }
.qa-header {
  padding: 14px 16px;
  cursor: pointer;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  user-select: none;
}
.qa-header:hover { background: var(--brand-bg); }
.qa-title {
  flex: 1;
  font-weight: 600;
  color: var(--text);
  font-size: 1rem;
  line-height: 1.5;
}
.qa-arrow {
  color: var(--brand);
  font-size: 1rem;
  transition: transform 0.2s;
  flex-shrink: 0;
  margin-top: 2px;
}
.qa-card.open .qa-arrow { transform: rotate(180deg); }
.qa-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease-out;
  background: var(--brand-bg);
}
.qa-card.open .qa-content { max-height: 10000px; }
.qa-body {
  padding: 16px;
  font-size: 0.95rem;
  white-space: pre-wrap;
  word-break: break-word;
  line-height: 1.8;
  color: var(--text);
  border-top: 1px solid var(--border);
}
.qa-body img { max-width: 100%; height: auto; border-radius: 8px; margin: 8px 0; display: block; }
.qa-body a { color: var(--brand); text-decoration: underline; word-break: break-all; }
.video-wrap {
  position: relative;
  padding-bottom: 56.25%;
  height: 0;
  margin: 10px 0;
  border-radius: 8px;
  overflow: hidden;
  background: #000;
}
.video-wrap iframe, .video-wrap video {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  border: 0;
}

.qa-tags {
  padding: 0 16px 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.tag {
  font-size: 0.75rem;
  padding: 3px 10px;
  background: var(--border);
  color: var(--text-light);
  border-radius: 12px;
}

.badge {
  font-size: 0.7rem;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
  display: inline-block;
  margin-left: 6px;
  vertical-align: middle;
}
.badge-urgent { background: #FFE5E5; color: #C8102E; border: 1px solid #C8102E; }
.badge-internal { background: #FFF3CD; color: #856404; border: 1px solid #FFC107; }

.ct-red { color: #C8102E; font-weight: 700; }
.ct-orange { color: #E67E22; font-weight: 600; }
.ct-green { color: #2D9F60; font-weight: 600; }
.ct-blue { color: #2E78B8; font-weight: 600; }
.ct-purple { color: #8E44AD; font-weight: 600; }

/* ========= Stations ========= */
.station-filters {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 12px;
}
.station-filter {
  padding: 6px 14px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 16px;
  font-size: 0.85rem;
  cursor: pointer;
  color: var(--text-light);
  transition: all 0.2s;
  user-select: none;
}
.station-filter:hover { border-color: var(--brand); color: var(--brand); }
.station-filter.active {
  background: var(--brand);
  color: var(--white);
  border-color: var(--brand);
}
.station-search {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 0.95rem;
  margin-bottom: 12px;
  outline: none;
  font-family: inherit;
}
.station-search:focus { border-color: var(--brand); }

.table-wrap {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.station-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.9rem;
  min-width: 700px;
}
.station-table th {
  background: var(--brand);
  color: var(--white);
  padding: 10px 12px;
  text-align: left;
  font-weight: 600;
  position: sticky;
  top: 0;
  white-space: nowrap;
}
.station-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
}
.station-table tr:hover { background: var(--brand-bg); }
.line-tag {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 0.8rem;
  font-weight: 600;
  white-space: nowrap;
  color: #fff;
}
.line-板南線 { background: #1E4A8C; }
.line-淡水信義線 { background: #C8102E; }
.line-松山新店線 { background: #2E8B3C; }
.line-中和新蘆線 { background: #E8A300; }
.line-文湖線 { background: #8B5A2B; }
.line-高雄捷運紅線 { background: #E30613; }
.line-門市YTM { background: #555; }
.grade-B { color: #2E78B8; font-weight: 600; }
.grade-C { color: #E67E22; font-weight: 600; }
.grade-門市 { color: #555; font-weight: 600; }

/* ========= Empty ========= */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-light);
}
.empty-state .big { font-size: 3rem; margin-bottom: 10px; }

/* ========= Modal ========= */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  justify-content: center;
  align-items: flex-start;
  padding: 20px;
  overflow-y: auto;
}
.modal.show { display: flex; }
.modal-content {
  background: var(--white);
  border-radius: var(--radius);
  max-width: 900px;
  width: 100%;
  max-height: calc(100vh - 40px);
  display: flex;
  flex-direction: column;
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}
.modal-header {
  padding: 18px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--brand);
  color: var(--white);
  border-radius: var(--radius) var(--radius) 0 0;
}
.modal-header h2 { font-size: 1.1rem; }
.modal-close {
  background: rgba(255,255,255,0.2);
  border: none;
  color: var(--white);
  width: 32px; height: 32px;
  border-radius: 50%;
  font-size: 1.2rem;
  cursor: pointer;
}
.modal-body { padding: 20px; overflow-y: auto; flex: 1; }

.login-form { text-align: center; padding: 20px; }
.login-form input {
  width: 100%;
  padding: 12px;
  font-size: 1rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  margin: 10px 0;
  outline: none;
  font-family: inherit;
}
.login-form input:focus { border-color: var(--brand); }
.btn-primary {
  background: var(--brand);
  color: var(--white);
  border: none;
  padding: 10px 24px;
  border-radius: 8px;
  font-size: 0.95rem;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.2s;
  font-family: inherit;
}
.btn-primary:hover { background: var(--brand-dark); }
.btn-secondary {
  background: var(--border);
  color: var(--text);
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 0.95rem;
  cursor: pointer;
  margin-right: 8px;
  font-family: inherit;
}

.admin-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
  border-bottom: 2px solid var(--border);
  overflow-x: auto;
}
.admin-tab {
  padding: 10px 14px;
  border: none;
  background: none;
  cursor: pointer;
  color: var(--text-light);
  font-weight: 600;
  white-space: nowrap;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  font-family: inherit;
  font-size: 0.9rem;
}
.admin-tab.active {
  color: var(--brand);
  border-bottom-color: var(--brand);
}

.admin-toolbar {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
  align-items: center;
}
.admin-toolbar input, .admin-toolbar select {
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: inherit;
  font-size: 0.9rem;
}

.admin-list {
  max-height: 50vh;
  overflow-y: auto;
  border: 1px solid var(--border);
  border-radius: 8px;
}
.admin-item {
  padding: 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.admin-item:last-child { border-bottom: none; }
.admin-item-info { flex: 1; min-width: 0; }
.admin-item-title {
  font-weight: 600;
  color: var(--text);
  margin-bottom: 2px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.admin-item-meta { font-size: 0.8rem; color: var(--text-light); }

.admin-btn {
  padding: 6px 12px;
  border: none;
  border-radius: 6px;
  font-size: 0.85rem;
  cursor: pointer;
  font-weight: 500;
  font-family: inherit;
}
.admin-btn-edit { background: #E3F2FD; color: #1976D2; }
.admin-btn-del { background: #FFEBEE; color: #C62828; }
.admin-btn-edit:hover { background: #BBDEFB; }
.admin-btn-del:hover { background: #FFCDD2; }

.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--text);
  font-size: 0.9rem;
}
.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 0.95rem;
  outline: none;
  font-family: inherit;
}
.form-group textarea { min-height: 220px; resize: vertical; line-height: 1.6; font-family: "Microsoft JhengHei", monospace; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: var(--brand);
}
.form-check { display: flex; gap: 16px; flex-wrap: wrap; }
.form-check label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 500;
  cursor: pointer;
}
.form-check input { width: auto; }

/* 編輯工具列 */
.editor-toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  padding: 8px;
  background: #F5F5F5;
  border: 1px solid var(--border);
  border-bottom: none;
  border-radius: 8px 8px 0 0;
  margin-bottom: -1px;
}
.tool-btn {
  padding: 6px 10px;
  border: 1px solid var(--border);
  background: var(--white);
  border-radius: 4px;
  cursor: pointer;
  font-size: 0.85rem;
  font-family: inherit;
  transition: all 0.15s;
}
.tool-btn:hover { background: var(--brand); color: var(--white); border-color: var(--brand); }
.tool-btn.color-red { color: #C8102E; font-weight: 700; }
.tool-btn.color-orange { color: #E67E22; font-weight: 600; }
.tool-btn.color-green { color: #2D9F60; font-weight: 600; }
.tool-btn.color-blue { color: #2E78B8; font-weight: 600; }
.tool-btn.color-purple { color: #8E44AD; font-weight: 600; }
.tool-sep { width: 1px; background: #CCC; margin: 0 4px; }

.editor-textarea {
  border-radius: 0 0 8px 8px !important;
  margin-top: 0 !important;
}

/* 圖示選擇器 */
.icon-picker {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(46px, 1fr));
  gap: 6px;
  max-height: 260px;
  overflow-y: auto;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #FAFAFA;
}
.icon-option {
  font-size: 1.5rem;
  padding: 8px;
  text-align: center;
  cursor: pointer;
  border-radius: 6px;
  background: var(--white);
  border: 2px solid transparent;
  transition: all 0.15s;
}
.icon-option:hover { border-color: var(--brand-light); }
.icon-option.selected {
  border-color: var(--brand);
  background: var(--brand-bg);
}

.syntax-hint {
  background: #FFF9E6;
  border: 1px solid #FFE082;
  padding: 10px;
  border-radius: 6px;
  font-size: 0.85rem;
  margin-bottom: 10px;
  color: #5D4037;
  line-height: 1.8;
}
.syntax-hint code {
  background: var(--white);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: monospace;
  color: var(--brand);
}

.export-section {
  background: var(--brand-bg);
  padding: 16px;
  border-radius: 8px;
  margin-top: 16px;
  border: 1px solid var(--brand-light);
}
.export-section h3 { color: var(--brand); margin-bottom: 8px; font-size: 1rem; }
.export-section p { font-size: 0.85rem; color: var(--text-light); margin-bottom: 10px; }

/* ========= Toast ========= */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--text);
  color: var(--white);
  padding: 12px 24px;
  border-radius: 25px;
  font-size: 0.9rem;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  z-index: 2000;
  opacity: 0;
  transition: all 0.3s;
  max-width: 90%;
  text-align: center;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

body.fs-large { --fs: 18px; }
body.fs-xlarge { --fs: 20px; }

.scroll-top {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 44px;
  height: 44px;
  background: var(--brand);
  color: var(--white);
  border: none;
  border-radius: 50%;
  font-size: 1.2rem;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(200,16,46,0.3);
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s;
  z-index: 50;
  font-family: inherit;
}
.scroll-top.show { opacity: 1; pointer-events: auto; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo-box">
      <!-- 亞尼克 LOGO (Yannick) -->
      <svg class="logo-svg" viewBox="0 0 220 60" xmlns="http://www.w3.org/2000/svg">
        <!-- 紅色菱形圖示 -->
        <g transform="translate(4, 8)">
          <path d="M22 0 L44 22 L22 44 L0 22 Z" fill="#C8102E"/>
          <path d="M22 6 L38 22 L22 38 L6 22 Z" fill="#FFF"/>
          <path d="M14 18 L22 10 L30 18 L28 22 L22 16 L16 22 Z" fill="#C8102E"/>
          <path d="M14 26 L30 26 L22 34 Z" fill="#C8102E"/>

<div class="container">
  <div class="update-banner" id="updateBanner">
    <span>🆕 偵測到 data.json 有新版本！</span>
    <button onclick="applyUpdate()">立即更新</button>
  </div>
  
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="搜尋關鍵字（標題、內容、標籤、站名）...">

<script>
// ============ 全域狀態 ============
let DATA = null;
let currentCategory = 'all';
let isAdmin = false;
let editingQA = null;
let editingStation = null;
let editingCategory = null;

const ADMIN_PASSWORD = '1234';

// 提供給分類挑選的圖示
const ICON_LIBRARY = [
  '🏢','🎂','💳','🎁','🏪','🌐','💰','📍',
  '📢','🛍️','🎯','⭐','🔥','💎','🎊','🎉',
  '📝','📋','📊','📈','📌','📞','📱','💬',
  '🚨','⚠️','🔒','🔑','✅','❌','❓','❗',
  '🚀','✨','💡','🎓','📚','📖','🔧','⚙️',
  '🍰','🍮','🧁','🍪','🍫','🍵','🥐','🥖',
  '🚚','🏃','🎈','🎀','💝','🛒','🏆','🌟'
];

window.addEventListener('DOMContentLoaded', init);

async function init() {
  try {
    const local = localStorage.getItem('ytm_qa_data');
    if (local) {
      try { DATA = JSON.parse(local); }
      catch(e) { DATA = await loadDataJson(); }
    } else {
      DATA = await loadDataJson();
    }
    renderAll();
    silentCheckUpdate();
  } catch (e) {
    console.error(e);
    document.getElementById('resultContainer').innerHTML = 
      '<div class="empty-state"><div class="big">⚠️</div><p>無法載入資料，請確認 data.json 檔案存在</p><p style="font-size:0.85rem;margin-top:8px;">' + e.message + '</p></div>';
  }
  document.getElementById('searchInput').addEventListener('input', onSearch);
  window.addEventListener('scroll', () => {
    const btn = document.getElementById('scrollTop');
    if (window.scrollY > 300) btn.classList.add('show');
    else btn.classList.remove('show');
  });
}

async function loadDataJson() {
  const res = await fetch('data.json?t=' + Date.now());
  if (!res.ok) throw new Error('data.json 載入失敗 (' + res.status + ')');
  return await res.json();
}

// ========= 檢查更新 =========
async function silentCheckUpdate() {
  try {
    const serverData = await loadDataJson();
    const localVer = DATA.meta.lastUpdate || '';
    const serverVer = serverData.meta.lastUpdate || '';
    if (serverVer && serverVer > localVer && localStorage.getItem('ytm_qa_data')) {
      // 有新版本且本地有暫存
      window._pendingUpdate = serverData;
      document.getElementById('updateBanner').classList.add('show');
    }
  } catch(e) { /* ignore */ }
}

async function checkUpdate() {
  showToast('檢查中...');
  try {
    const serverData = await loadDataJson();
    const localVer = DATA.meta.lastUpdate || '';
    const serverVer = serverData.meta.lastUpdate || '';
    if (!localStorage.getItem('ytm_qa_data')) {
      // 沒有本地暫存，直接載入
      DATA = serverData;
      renderAll();
      showToast('已是最新版本');
      return;
    }
    if (serverVer && serverVer > localVer) {
      window._pendingUpdate = serverData;
      document.getElementById('updateBanner').classList.add('show');
      showToast('發現新版本！');
    } else {
      showToast('已是最新版本');
    }
  } catch(e) {
    showToast('檢查失敗：' + e.message);
  }
}

function applyUpdate() {
  if (!window._pendingUpdate) return;
  if (!confirm('套用新版本將覆蓋本機暫存的修改，確定？')) return;
  DATA = window._pendingUpdate;
  window._pendingUpdate = null;
  localStorage.removeItem('ytm_qa_data');
  document.getElementById('updateBanner').classList.remove('show');
  renderAll();
  showToast('已套用新版本');
}

// ============ 主渲染 ============
function renderAll() {
  document.getElementById('headerTitle').textContent = DATA.meta.title || '亞尼克YTM客服助手';
  
  const contact = document.getElementById('headerContact');
  let html = '';
  html += `<div>📞 <strong>客服</strong>${DATA.meta.subtitle || '02-7733-5557'}</div>`;
  if (DATA.meta.email) html += `<div>📧 <strong>信箱</strong>${DATA.meta.email}</div>`;
  if (DATA.meta.lineId) html += `<div>💬 <strong>官方LINE</strong>${DATA.meta.lineId}${DATA.meta.ytmLineId?'｜YTM:'+DATA.meta.ytmLineId:''}</div>`;
  contact.innerHTML = html;
  
  document.getElementById('marqueeText').textContent = DATA.marquee || '';
  renderCategories();
  renderQA();
}

function renderCategories() {
  const box = document.getElementById('categoryContainer');
  let html = `<div class="category-card ${currentCategory==='all'?'active':''}" onclick="selectCategory('all')">
    <span class="icon">📚</span><div class="name">全部</div><div class="count">${DATA.qa.length}</div>
  </div>`;
  DATA.categories.forEach(c => {
    const count = c.id === 'station' 
      ? (DATA.stations ? DATA.stations.length : 0)
      : DATA.qa.filter(q => q.category === c.id).length;
    html += `<div class="category-card ${currentCategory===c.id?'active':''}" onclick="selectCategory('${c.id}')">
      <span class="icon">${c.icon}</span>
      <div class="name">${escapeHtml(c.name)}</div>
      <div class="count">${count}</div>
    </div>`;
  });
  box.innerHTML = html;
}

function selectCategory(id) {
  currentCategory = id;
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('show');
  renderCategories();
  renderQA();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function renderQA() {
  const kw = document.getElementById('searchInput').value.trim().toLowerCase();
  const container = document.getElementById('resultContainer');
  
  if (currentCategory === 'station') {
    renderStations();
    return;
  }
  
  let list = DATA.qa;
  if (currentCategory !== 'all') list = list.filter(q => q.category === currentCategory);
  if (kw) {
    list = list.filter(q => 
      q.title.toLowerCase().includes(kw) || 
      q.content.toLowerCase().includes(kw) ||
      (q.tags || []).some(t => t.toLowerCase().includes(kw))
    );
  }
  
  let stationResult = [];
  if (kw && DATA.stations) {
    stationResult = DATA.stations.filter(s => 
      s.name.toLowerCase().includes(kw) || 
      (s.address || '').toLowerCase().includes(kw) ||
      (s.line || '').toLowerCase().includes(kw) ||
      (s.exit || '').toLowerCase().includes(kw) ||
      (s.code || '').toLowerCase().includes(kw)
    );
  }
  
  if (list.length === 0 && stationResult.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="big">🔍</div><p>找不到相關資料</p><p style="font-size:0.85rem;margin-top:8px;">試試其他關鍵字，或點選分類瀏覽</p></div>';
    return;
  }
  
  let html = '';
  if (list.length > 0) {
    const title = kw ? `搜尋結果：「${escapeHtml(kw)}」` : 
                  currentCategory === 'all' ? '全部 QA' : 
                  DATA.categories.find(c=>c.id===currentCategory)?.name || '';
    html += `<div class="section-title">${title}<span class="count-badge">${list.length} 則</span></div>`;
    html += '<div class="qa-list">';
    list.forEach(q => html += renderQACard(q, kw));
    html += '</div>';
  }
  
  if (stationResult.length > 0) {
    html += `<div class="section-title">📍 相關據點<span class="count-badge">${stationResult.length} 站</span></div>`;
    html += renderStationTable(stationResult);
  }
  
  container.innerHTML = html;
}

function renderQACard(q, kw) {
  const cat = DATA.categories.find(c => c.id === q.category);
  let badges = '';
  if (q.urgent) badges += '<span class="badge badge-urgent">🚨 緊急</span>';
  if (q.internal) badges += '<span class="badge badge-internal">🔒 內部</span>';
  
  const content = formatContent(q.content);
  const titleHl = kw ? highlight(q.title, kw) : escapeHtml(q.title);
  
  let tagsHtml = '';
  if (q.tags && q.tags.length) {
    tagsHtml = '<div class="qa-tags">' + q.tags.map(t => `<span class="tag">#${escapeHtml(t)}</span>`).join('') + '</div>';
  }
  
  return `<div class="qa-card" data-id="${q.id}">
    <div class="qa-header" onclick="toggleQA(${q.id})">
      <div class="qa-title">${cat?cat.icon:''} ${titleHl}${badges}</div>
      <span class="qa-arrow">▼</span>
    </div>
    <div class="qa-content">
      <div class="qa-body">${content}</div>
      ${tagsHtml}
    </div>
  </div>`;
}

function toggleQA(id) {
  const card = document.querySelector(`.qa-card[data-id="${id}"]`);
  if (card) card.classList.toggle('open');
}

// ============ 據點 ============
function renderStations() {
  const container = document.getElementById('resultContainer');
  const lines = [...new Set(DATA.stations.map(s => s.line))].filter(Boolean);
  const groups = [...new Set(DATA.stations.map(s => s.group))].filter(Boolean);
  
  let html = `<div class="section-title">📍 YTM 據點資訊 <span class="count-badge">共 ${DATA.stations.length} 站</span></div>`;
  html += '<input type="text" class="station-search" id="stationSearch" placeholder="🔍 搜尋站名、地址、捷運線..." oninput="filterStations()">';
  
  html += '<div class="station-filters" id="lineFilters">';
  html += `<div class="station-filter active" data-filter="line" data-value="all" onclick="setStationFilter(this)">全部路線</div>`;
  lines.forEach(l => {
    html += `<div class="station-filter" data-filter="line" data-value="${escapeHtml(l)}" onclick="setStationFilter(this)">${escapeHtml(l)}</div>`;
  });
  html += '</div>';
  
  html += '<div class="station-filters" id="groupFilters">';
  html += `<div class="station-filter active" data-filter="group" data-value="all" onclick="setStationFilter(this)">全部批次</div>`;
  groups.forEach(g => {
    html += `<div class="station-filter" data-filter="group" data-value="${escapeHtml(g)}" onclick="setStationFilter(this)">${escapeHtml(g)}</div>`;
  });
  html += '</div>';
  
  html += '<div id="stationTableWrap">' + renderStationTable(DATA.stations) + '</div>';
  container.innerHTML = html;
}

function renderStationTable(stations) {
  if (!stations || stations.length === 0) {
    return '<div class="empty-state"><p>沒有符合條件的據點</p></div>';
  }
  let html = '<div class="table-wrap"><table class="station-table"><thead><tr>';
  html += '<th>編號</th><th>站名</th><th>路線</th><th>分級</th><th>地址</th><th>位置</th><th>批次</th>';
  html += '</tr></thead><tbody>';
  stations.forEach(s => {
    const lineKey = (s.line || '').replace(/\s/g, '');
    html += `<tr>
      <td>${escapeHtml(s.code || s.id)}</td>
      <td><strong>${escapeHtml(s.name)}</strong></td>
      <td><span class="line-tag line-${lineKey}">${escapeHtml(s.line || '')}</span></td>
      <td class="grade-${s.grade || ''}">${escapeHtml(s.grade || '')}</td>
      <td>${escapeHtml(s.address || '—')}</td>
      <td>${escapeHtml(s.exit || '—')}</td>
      <td><small>${escapeHtml(s.group || '')}</small></td>
    </tr>`;
  });
  html += '</tbody></table></div>';
  return html;
}

function setStationFilter(el) {
  el.parentElement.querySelectorAll('.station-filter').forEach(f => f.classList.remove('active'));
  el.classList.add('active');
  filterStations();
}

function filterStations() {
  const kw = (document.getElementById('stationSearch').value || '').toLowerCase();
  const activeLineEl = document.querySelector('#lineFilters .station-filter.active');
  const activeGroupEl = document.querySelector('#groupFilters .station-filter.active');
  const line = activeLineEl ? activeLineEl.dataset.value : 'all';
  const group = activeGroupEl ? activeGroupEl.dataset.value : 'all';
  
  let result = DATA.stations;
  if (line !== 'all') result = result.filter(s => s.line === line);
  if (group !== 'all') result = result.filter(s => s.group === group);
  if (kw) {
    result = result.filter(s => 
      s.name.toLowerCase().includes(kw) || 
      (s.address || '').toLowerCase().includes(kw) ||
      (s.exit || '').toLowerCase().includes(kw) ||
      (s.code || '').toLowerCase().includes(kw)
    );
  }
  document.getElementById('stationTableWrap').innerHTML = renderStationTable(result);
}

// ============ 搜尋 ============
function onSearch() {
  const val = document.getElementById('searchInput').value;
  document.getElementById('searchClear').classList.toggle('show', val.length > 0);
  renderQA();
}
function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('show');
  renderQA();
}

// ============ 格式化 ============
function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function formatContent(content) {
  if (!content) return '';
  let s = escapeHtml(content);
  s = s.replace(/\[\[red:(.*?)\]\]/g, '<span class="ct-red">$1</span>');
  s = s.replace(/\[\[orange:(.*?)\]\]/g, '<span class="ct-orange">$1</span>');
  s = s.replace(/\[\[green:(.*?)\]\]/g, '<span class="ct-green">$1</span>');
  s = s.replace(/\[\[blue:(.*?)\]\]/g, '<span class="ct-blue">$1</span>');
  s = s.replace(/\[\[purple:(.*?)\]\]/g, '<span class="ct-purple">$1</span>');
  s = s.replace(/\[\[link:(.*?)\|(.*?)\]\]/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  s = s.replace(/\[\[img:(.*?)\]\]/g, '<img src="$1" alt="圖片">');
  // 影片：[[video:URL]] 支援 YouTube / Vimeo / 直接 mp4
  s = s.replace(/\[\[video:(.*?)\]\]/g, (m, url) => {
    const u = url.trim();
    // YouTube
    const yt = u.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]+)/);
    if (yt) return `<div class="video-wrap"><iframe src="https://www.youtube.com/embed/${yt[1]}" allowfullscreen></iframe></div>`;
    // Vimeo
    const vm = u.match(/vimeo\.com\/(\d+)/);
    if (vm) return `<div class="video-wrap"><iframe src="https://player.vimeo.com/video/${vm[1]}" allowfullscreen></iframe></div>`;
    // 直接影片檔
    if (/\.(mp4|webm|ogg)(\?|$)/i.test(u)) return `<div class="video-wrap"><video controls src="${u}"></video></div>`;
    // 其他情況：顯示為連結
    return `<a href="${u}" target="_blank" rel="noopener">🎥 ${u}</a>`;
  });
  // 自動連結
  s = s.replace(/(^|[^"'>=\/])(https?:\/\/[^\s<]+)/g, (m, pre, url) => {
    // 避免跟已處理的連結衝突
    if (pre === '/' || pre === '"' || pre === "'") return m;
    return `${pre}<a href="${url}" target="_blank" rel="noopener">${url}</a>`;
  });
  return s;
}

function highlight(text, kw) {
  if (!kw) return escapeHtml(text);
  const safe = escapeHtml(text);
  const safeKw = escapeHtml(kw);
  const re = new RegExp('(' + safeKw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return safe.replace(re, '<mark style="background:#FFE58F;padding:0 2px;border-radius:2px;">$1</mark>');
}

// ============ 字體 ============
function toggleFontSize() {
  const body = document.body;
  if (body.classList.contains('fs-large')) {
    body.classList.remove('fs-large');
    body.classList.add('fs-xlarge');
    showToast('字體：特大');
  } else if (body.classList.contains('fs-xlarge')) {
    body.classList.remove('fs-xlarge');
    showToast('字體：一般');
  } else {
    body.classList.add('fs-large');
    showToast('字體：大');
  }
}

function scrollToTop() { window.scrollTo({top: 0, behavior: 'smooth'}); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

  else showAdminPanel();
}

function showLoginForm() {
  document.getElementById('adminTitle').textContent = '🔒 管理後台登入';
  document.getElementById('adminBody').innerHTML = `
    <div class="login-form">
      <div style="font-size:3rem;margin-bottom:10px;">🔐</div>
      <p style="color:var(--text-light);margin-bottom:16px;">請輸入管理密碼</p>
      <input type="password" id="adminPwd" placeholder="密碼" onkeydown="if(event.key==='Enter')login()">
      <div style="margin-top:10px;">
        <button class="btn-primary" onclick="login()">登入</button>
      </div>
    </div>
  `;
  setTimeout(() => document.getElementById('adminPwd').focus(), 100);
}

function login() {
  const pwd = document.getElementById('adminPwd').value;
  if (pwd === ADMIN_PASSWORD) {
    isAdmin = true;
    showAdminPanel();
    showToast('登入成功');
  } else {
    showToast('密碼錯誤');
    document.getElementById('adminPwd').value = '';
    document.getElementById('adminPwd').focus();
  }
}

function showAdminPanel() {
  document.getElementById('adminTitle').textContent = '⚙️ 管理後台';
  document.getElementById('adminBody').innerHTML = `
    <div class="admin-tabs">
      <button class="admin-tab active" onclick="showAdminTab('qa', this)">📝 QA 管理</button>
      <button class="admin-tab" onclick="showAdminTab('category', this)">📂 分類管理</button>
      <button class="admin-tab" onclick="showAdminTab('station', this)">📍 據點管理</button>
      <button class="admin-tab" onclick="showAdminTab('meta', this)">⚙️ 基本設定</button>
      <button class="admin-tab" onclick="showAdminTab('export', this)">💾 匯入/匯出</button>
    </div>
    <div id="adminTabContent"></div>
  `;
  showAdminTab('qa');
}

function showAdminTab(tab, el) {
  if (el) {
    document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }
  const box = document.getElementById('adminTabContent');
  if (tab === 'qa') box.innerHTML = renderAdminQA();
  else if (tab === 'category') box.innerHTML = renderAdminCategory();
  else if (tab === 'station') box.innerHTML = renderAdminStation();
  else if (tab === 'meta') box.innerHTML = renderAdminMeta();
  else if (tab === 'export') box.innerHTML = renderAdminExport();
}

// ---- QA 管理 ----
function renderAdminQA() {
  setTimeout(renderAdminQAList, 0);
  return `
    <div class="admin-toolbar">
      <button class="btn-primary" onclick="editQA(null)">➕ 新增 QA</button>
      <input type="text" id="adminQASearch" placeholder="搜尋..." style="flex:1;" oninput="renderAdminQAList()">
      <select id="adminQAFilter" onchange="renderAdminQAList()">
        <option value="all">全部分類</option>
        ${DATA.categories.map(c => `<option value="${c.id}">${c.icon} ${escapeHtml(c.name)}</option>`).join('')}
      </select>
    </div>
    <div class="admin-list" id="adminQAList"></div>
  `;
}

function renderAdminQAList() {
  const kw = (document.getElementById('adminQASearch')?.value || '').toLowerCase();
  const filter = document.getElementById('adminQAFilter')?.value || 'all';
  let list = DATA.qa;
  if (filter !== 'all') list = list.filter(q => q.category === filter);
  if (kw) list = list.filter(q => q.title.toLowerCase().includes(kw) || q.content.toLowerCase().includes(kw));
  
  const html = list.map(q => {
    const cat = DATA.categories.find(c => c.id === q.category);
    let flags = '';
    if (q.urgent) flags += ' 🚨';
    if (q.internal) flags += ' 🔒';
    return `<div class="admin-item">
      <div class="admin-item-info">
        <div class="admin-item-title">${cat?cat.icon:''} ${escapeHtml(q.title)}${flags}</div>
        <div class="admin-item-meta">${cat?escapeHtml(cat.name):''} ｜ ${q.tags && q.tags.length ? escapeHtml(q.tags.join(', ')) : '無標籤'}</div>
      </div>
      <button class="admin-btn admin-btn-edit" onclick="editQA(${q.id})">編輯</button>
      <button class="admin-btn admin-btn-del" onclick="deleteQA(${q.id})">刪除</button>

// 選取文字套用色彩
function wrapSelection(color) {
  const ta = document.getElementById('qaContent');
  const start = ta.selectionStart;
  const end = ta.selectionEnd;
  if (start === end) {
    showToast('請先選取要套用的文字');
    return;
  }
  const selected = ta.value.slice(start, end);
  const before = ta.value.slice(0, start);
  const after = ta.value.slice(end);
  ta.value = before + `[[${color}:${selected}]]` + after;
  ta.focus();
  const newPos = before.length + `[[${color}:${selected}]]`.length;
  ta.setSelectionRange(newPos, newPos);
}

function insertImage(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 800*1024) {
    if (!confirm('圖片超過 800KB，會讓 data.json 變大，建議先壓縮。仍要繼續？')) {
      input.value = '';
      return;
    }
  }
  const reader = new FileReader();
  reader.onload = e => {
    const ta = document.getElementById('qaContent');
    const syntax = `[[img:${e.target.result}]]`;
    const pos = ta.selectionStart || ta.value.length;
    ta.value = ta.value.slice(0, pos) + '\n' + syntax + '\n' + ta.value.slice(pos);
    showToast('圖片已插入');
  };
  reader.readAsDataURL(file);
  input.value = '';
}

function insertVideo() {
  const url = prompt('請貼上影片網址（支援 YouTube、Vimeo、mp4 等）：');
  if (!url) return;
  const ta = document.getElementById('qaContent');
  const syntax = `[[video:${url.trim()}]]`;
  const pos = ta.selectionStart || ta.value.length;
  ta.value = ta.value.slice(0, pos) + '\n' + syntax + '\n' + ta.value.slice(pos);
  showToast('影片已插入');
}

function insertLink() {
  const text = prompt('請輸入連結顯示文字：');
  if (!text) return;
  const url = prompt('請貼上網址：');
  if (!url) return;
  const ta = document.getElementById('qaContent');
  const syntax = `[[link:${text}|${url}]]`;
  const pos = ta.selectionStart || ta.value.length;
  ta.value = ta.value.slice(0, pos) + syntax + ta.value.slice(pos);
  showToast('連結已插入');
}

function saveQA() {
  const title = document.getElementById('qaTitle').value.trim();
  const content = document.getElementById('qaContent').value.trim();
  if (!title || !content) { showToast('標題與內容不可空白'); return; }
  
  const cat = document.getElementById('qaCat').value;
  const tags = document.getElementById('qaTags').value.split(',').map(s=>s.trim()).filter(Boolean);
  const urgent = document.getElementById('qaUrgent').checked;
  const internal = document.getElementById('qaInternal').checked;
  
  if (editingQA.id) {
    const q = DATA.qa.find(x => x.id === editingQA.id);
    q.category = cat; q.title = title; q.content = content; q.tags = tags;
    if (urgent) q.urgent = true; else delete q.urgent;
    if (internal) q.internal = true; else delete q.internal;
  } else {
    const newId = Math.max(0, ...DATA.qa.map(x => x.id)) + 1;
    const newQ = { id: newId, category: cat, title, content, tags };
    if (urgent) newQ.urgent = true;
    if (internal) newQ.internal = true;
    DATA.qa.push(newQ);
  }
  
  saveLocal();
  showToast('已儲存（記得到「匯入/匯出」下載 data.json）');
  showAdminTab('qa', document.querySelector('.admin-tab.active'));
  renderAll();
}

function deleteQA(id) {
  const q = DATA.qa.find(x => x.id === id);
  if (!q) return;
  if (!confirm(`確定要刪除「${q.title}」？`)) return;
  DATA.qa = DATA.qa.filter(x => x.id !== id);
  saveLocal();
  showToast('已刪除');
  renderAdminQAList();
  renderAll();
}

function selectIcon(el) {
  document.querySelectorAll('.icon-option').forEach(o => o.classList.remove('selected'));

  document.getElementById('iconCustom').value = '';

function saveCategory() {
  const name = document.getElementById('catName').value.trim();
  const idVal = document.getElementById('catId').value.trim();
  const custom = document.getElementById('iconCustom').value.trim();
  const selectedIcon = document.querySelector('.icon-option.selected')?.dataset.icon;
  const icon = custom || selectedIcon || editingCategory.icon;
  
  if (!name) { showToast('名稱不可空白'); return; }
  if (!idVal) { showToast('ID 不可空白'); return; }
  if (!/^[a-zA-Z0-9_]+$/.test(idVal)) { showToast('ID 只能用英文/數字/底線'); return; }
  
  if (editingCategory._isNew) {
    if (DATA.categories.find(x => x.id === idVal)) {
      showToast('ID 已存在，請換一個');
      return;
    }
    DATA.categories.push({ id: idVal, name, icon });
  } else {
    const c = DATA.categories.find(x => x.id === editingCategory.id);
    c.name = name;
    c.icon = icon;
  }
  saveLocal();
  showToast('已儲存');
  showAdminTab('category', document.querySelector('.admin-tab.active'));
  renderAll();
}

function deleteCategory(id) {
  const c = DATA.categories.find(x => x.id === id);

  const count = DATA.qa.filter(q => q.category === id).length;
  if (count > 0) {
    alert(`此分類還有 ${count} 則 QA，請先把這些 QA 移到其他分類後再刪除`);
    return;
  }
  if (!confirm(`確定要刪除分類「${c.name}」？`)) return;
  DATA.categories = DATA.categories.filter(x => x.id !== id);
  saveLocal();
  showToast('已刪除');
  renderAdminCategoryList();
  renderAll();
}

      <h3 style="color:#E65100;">🔄 從伺服器重新載入</h3>
      <p>捨棄本機暫存的修改，重新從 <code>data.json</code> 載入。</p>
      <button class="btn-primary" style="background:#E65100;" onclick="reloadFromServer()">重新載入</button>
    </div>
    
    <div class="export-section" style="background:#FFEBEE;border-color:#EF9A9A;">
      <h3 style="color:#C62828;">🗑️ 清除本機暫存</h3>
      <p>清除瀏覽器暫存的資料並登出管理。</p>
      <button class="btn-primary" style="background:#C62828;" onclick="clearLocal()">清除暫存</button>
    </div>
    
    <div style="margin-top:20px;padding:16px;background:var(--brand-bg);border-radius:8px;font-size:0.9rem;color:var(--text-light);">
      <strong style="color:var(--brand);">📖 部署工作流程</strong><br>
      1. 在管理後台編輯 QA / 據點 / 分類 / 設定<br>
      2. 編輯完成後，到此分頁按「⬇️ 下載 data.json」<br>
      3. 把下載的 <code>data.json</code> 上傳到 GitHub 覆蓋原檔案<br>
      4. 其他使用者重新整理後會看到更新通知，點一下就能套用<br><br>
      <strong style="color:var(--brand);">📊 目前資料統計</strong><br>
      QA 總數：${DATA.qa.length} 則 ｜ 據點總數：${DATA.stations.length} 站 ｜ 分類數：${DATA.categories.length} 類<br>
      最後更新：${DATA.meta.lastUpdate || '（尚未設定）'}
    </div>
  `;
}

function exportData() {
  DATA.meta.lastUpdate = new Date().toISOString().split('T')[0];
  const json = JSON.stringify(DATA, null, 2);
  const blob = new Blob([json], { type: 'application/json;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'data.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('data.json 已下載');
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  if (!confirm('匯入會覆蓋目前所有資料，確定？')) { input.value=''; return; }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!parsed.qa || !parsed.categories) {
        showToast('檔案格式不正確');
        return;
      }
      DATA = parsed;
      saveLocal();
      showToast('匯入成功');
      renderAll();
      showAdminTab('export', document.querySelector('.admin-tab.active'));
    } catch (err) {
      showToast('檔案解析失敗：' + err.message);
    }
  };
  reader.readAsText(file);
  input.value = '';
}

async function reloadFromServer() {
  if (!confirm('會捨棄本機暫存的修改，確定？')) return;
  localStorage.removeItem('ytm_qa_data');
  try {
    DATA = await loadDataJson();
    showToast('已從伺服器重新載入');
    renderAll();
    showAdminTab('export', document.querySelector('.admin-tab.active'));
  } catch(e) {
    showToast('重新載入失敗');
  }
}

function clearLocal() {
  if (!confirm('清除本機暫存並登出管理？')) return;
  localStorage.removeItem('ytm_qa_data');
  isAdmin = false;
  closeAdmin();
  showToast('已清除');
  location.reload();
}

function saveLocal() {
  DATA.meta.lastUpdate = new Date().toISOString().split('T')[0];
  try { localStorage.setItem('ytm_qa_data', JSON.stringify(DATA)); }
  catch(e) { console.warn('localStorage 儲存失敗', e); }
}

document.getElementById('adminModal').addEventListener('click', e => {
  if (e.target.id === 'adminModal') closeAdmin();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeAdmin();
});
</script>

</body>
</html>
