<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>дәһе°је…ӢYTMе®ўжңҚеҠ©жүӢ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--brand:#C8102E;--brand-dark:#A00D24;--brand-light:#E8847A;--brand-bg:#FFF5F5;--success:#2D9F60;--text:#2C2C2C;--text-light:#6B6B6B;--border:#E8E0E0;--bg:#FAF7F5;--white:#FFF;--shadow:0 2px 8px rgba(200,16,46,.08);--shadow-hover:0 6px 20px rgba(200,16,46,.15);--radius:12px;--fs:16px}
html{font-size:var(--fs)}
body{font-family:-apple-system,BlinkMacSystemFont,"Microsoft JhengHei","PingFang TC","Segoe UI",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;padding-bottom:40px}

/* Header */
.header{background:linear-gradient(135deg,var(--brand),var(--brand-dark));color:#fff;padding:16px;box-shadow:0 4px 12px rgba(200,16,46,.2);position:sticky;top:0;z-index:100}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.logo-box{background:#fff;border-radius:12px;padding:10px 16px;display:flex;align-items:center;box-shadow:0 2px 6px rgba(0,0,0,.1);flex-shrink:0}
.logo-svg{height:76px;width:auto;display:block}
.header-center{flex:1;min-width:180px}
.header h1{font-size:1.25rem;margin-bottom:4px;letter-spacing:1px;font-weight:700}
.header-contact{font-size:.8rem;opacity:.95;line-height:1.7}
.header-contact strong{color:#FFE082;margin-right:4px}
.header-actions{display:flex;gap:6px;flex-shrink:0}
.btn-icon{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 12px;border-radius:20px;font-size:.8rem;cursor:pointer;transition:.2s;white-space:nowrap;font-family:inherit}
.btn-icon:hover{background:rgba(255,255,255,.28)}
@media(max-width:640px){.header-inner{gap:10px}.header h1{font-size:1.05rem}.header-contact{font-size:.72rem}.logo-svg{height:60px}.btn-icon{padding:5px 10px;font-size:.75rem}}

/* Marquee */
.marquee-wrap{background:#FFF8E1;border-bottom:1px solid #F5D98E;overflow:hidden;padding:8px 0}
.marquee{display:inline-block;white-space:nowrap;animation:marquee 40s linear infinite;font-size:.85rem;color:#8B4513}
@keyframes marquee{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}

.container{max-width:1200px;margin:0 auto;padding:16px}

/* Update Banner */
.update-banner{background:#E8F5E9;border:1px solid #81C784;border-radius:10px;padding:12px 16px;margin-bottom:14px;display:none;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;font-size:.9rem;color:#1B5E20}
.update-banner.show{display:flex}
.update-banner button{background:#2E7D32;color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.85rem;font-family:inherit}

/* Search */
.search-box{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:12px 16px;display:flex;align-items:center;gap:10px;margin-bottom:16px}
.search-box input{flex:1;border:none;outline:none;font-size:1rem;color:var(--text);background:transparent;padding:4px 0;font-family:inherit}
.search-icon{color:var(--brand);font-size:1.2rem}
.search-clear{background:var(--border);border:none;border-radius:50%;width:24px;height:24px;font-size:.8rem;cursor:pointer;color:var(--text-light);display:none}
.search-clear.show{display:block}

/* Layout */
.main-layout{display:flex;gap:16px;align-items:flex-start}
.sidebar{width:220px;flex-shrink:0;position:sticky;top:120px;max-height:calc(100vh - 140px);overflow-y:auto;background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:0;border:1px solid var(--border)}
.sidebar-header{background:var(--brand);color:#fff;padding:12px 16px;font-weight:700;font-size:.95rem;border-radius:var(--radius) var(--radius) 0 0;text-align:center}
.content-area{flex:1;min-width:0}
.sidebar-toggle{display:none;position:fixed;bottom:70px;left:16px;width:44px;height:44px;background:var(--brand);color:#fff;border:none;border-radius:50%;font-size:1.2rem;cursor:pointer;box-shadow:0 4px 12px rgba(200,16,46,.3);z-index:50;font-family:inherit}

/* Categories as sidebar list */
.categories{display:flex;flex-direction:column;gap:0;margin-bottom:0}
.category-card{background:var(--white);border:none;border-bottom:1px solid var(--border);border-radius:0;padding:12px 14px;text-align:left;cursor:pointer;transition:.2s;position:relative;display:flex;align-items:center;gap:10px}
.category-card:last-child{border-bottom:none}
.category-card:hover{background:var(--brand-bg)}
.category-card.active{background:var(--brand);color:#fff}
.category-card .icon{font-size:1.3rem;display:block;margin-bottom:0;flex-shrink:0}
.category-card .name{font-size:.85rem;font-weight:600;flex:1}
.category-card .count{position:static;background:var(--brand);color:#fff;font-size:.7rem;padding:2px 8px;border-radius:12px;font-weight:600;flex-shrink:0}
.category-card.active .count{background:rgba(255,255,255,.3);color:#fff}

@media(max-width:900px){
  .main-layout{flex-direction:column}
  .sidebar{width:100%;position:static;max-height:none;overflow:visible}
  .sidebar.collapsed .categories{display:none}
  .sidebar.collapsed .sidebar-header::after{content:' в–ј';font-size:.8rem}
  .sidebar-header{cursor:pointer}
  .sidebar-toggle{display:none}
}
@media(min-width:901px){
  .sidebar-toggle{display:none}
}

/* Section Title */
.section-title{font-size:1.1rem;font-weight:700;color:var(--brand);margin:16px 0 12px;padding-left:12px;border-left:4px solid var(--brand);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.section-title .count-badge{font-size:.8rem;color:var(--text-light);font-weight:500}

/* QA Cards */
.qa-list{display:flex;flex-direction:column;gap:12px}
.qa-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;border:1px solid var(--border);transition:.2s;position:relative}
.qa-card:hover{box-shadow:var(--shadow-hover)}
.qa-header{padding:14px 16px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;user-select:none}
.qa-header:hover{background:var(--brand-bg)}
.qa-title{flex:1;font-weight:600;color:var(--text);font-size:1rem;line-height:1.5}
.qa-arrow{color:var(--brand);font-size:1rem;transition:transform .2s;flex-shrink:0;margin-top:2px}
.qa-card.open .qa-arrow{transform:rotate(180deg)}
.qa-content{max-height:0;overflow:hidden;transition:max-height .3s ease-out;background:var(--brand-bg)}
.qa-card.open .qa-content{max-height:10000px}
.qa-body{padding:16px;font-size:.95rem;white-space:pre-wrap;word-break:break-word;line-height:1.8;color:var(--text);border-top:1px solid var(--border)}
.qa-body img{max-width:100%;height:auto;border-radius:8px;margin:8px 0;display:block}
.qa-body a{color:var(--brand);text-decoration:underline;word-break:break-all}
.video-wrap{position:relative;padding-bottom:56.25%;height:0;margin:10px 0;border-radius:8px;overflow:hidden;background:#000}
.video-wrap iframe,.video-wrap video{position:absolute;top:0;left:0;width:100%;height:100%;border:0}
.qa-tags{padding:0 16px 12px;display:flex;flex-wrap:wrap;gap:6px}
.tag{font-size:.75rem;padding:3px 10px;background:var(--border);color:var(--text-light);border-radius:12px}
.badge{font-size:.7rem;padding:2px 8px;border-radius:10px;font-weight:600;display:inline-block;margin-left:6px;vertical-align:middle}
.badge-urgent{background:#FFE5E5;color:#C8102E;border:1px solid #C8102E}
.badge-internal{background:#FFF3CD;color:#856404;border:1px solid #FFC107}

/* Edit Pencil & Sort (admin only) */
.qa-admin-btns{position:absolute;top:8px;right:8px;display:none;gap:4px;z-index:5}
body.admin-mode .qa-admin-btns{display:flex}
.qa-admin-btns button{background:var(--brand);color:#fff;border:none;width:28px;height:28px;border-radius:50%;font-size:.75rem;cursor:pointer;box-shadow:0 2px 4px rgba(0,0,0,.12);opacity:.7;transition:.2s;padding:0;line-height:28px;text-align:center}
.qa-admin-btns button:hover{opacity:1;transform:scale(1.1)}

/* Inline Edit Panel */
.qa-edit-panel{background:#fff;border-top:2px solid var(--brand);padding:16px;display:none}
.qa-edit-panel.show{display:block}
.edit-toolbar{display:flex;flex-wrap:wrap;gap:4px;padding:8px;background:#F5F5F5;border:1px solid var(--border);border-bottom:none;border-radius:8px 8px 0 0;margin-bottom:-1px}
.tool-btn{padding:6px 10px;border:1px solid var(--border);background:#fff;border-radius:4px;cursor:pointer;font-size:.85rem;font-family:inherit;transition:.15s}
.tool-btn:hover{background:var(--brand);color:#fff;border-color:var(--brand)}
.tool-btn.c-red{color:#C8102E;font-weight:700}
.tool-btn.c-orange{color:#E67E22;font-weight:600}
.tool-btn.c-green{color:#2D9F60;font-weight:600}
.tool-btn.c-blue{color:#2E78B8;font-weight:600}
.tool-btn.c-purple{color:#8E44AD;font-weight:600}
.tool-sep{width:1px;background:#CCC;margin:0 4px}
.edit-textarea{width:100%;min-height:200px;padding:10px;border:1px solid var(--border);border-radius:0 0 8px 8px;font-size:.95rem;font-family:"Microsoft JhengHei",monospace;line-height:1.6;resize:vertical;outline:none}
.edit-textarea:focus{border-color:var(--brand)}
.edit-field{margin-bottom:12px}
.edit-field label{display:block;font-weight:600;margin-bottom:4px;font-size:.85rem;color:var(--text)}
.edit-field input,.edit-field select{width:100%;padding:8px;border:1px solid var(--border);border-radius:6px;font-size:.9rem;outline:none;font-family:inherit}
.edit-field input:focus,.edit-field select:focus{border-color:var(--brand)}
.edit-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.edit-actions button{padding:8px 16px;border:none;border-radius:6px;font-size:.9rem;cursor:pointer;font-family:inherit;font-weight:600}
.edit-save{background:var(--brand);color:#fff}
.edit-save:hover{background:var(--brand-dark)}
.edit-cancel{background:var(--border);color:var(--text)}
.edit-delete{background:#FFEBEE;color:#C62828}
.edit-check{display:flex;gap:14px;margin-bottom:8px;flex-wrap:wrap}
.edit-check label{display:flex;align-items:center;gap:4px;font-size:.85rem;cursor:pointer}
.edit-check input{width:auto}

/* Color text */
.ct-red{color:#C8102E;font-weight:700}
.ct-orange{color:#E67E22;font-weight:600}
.ct-green{color:#2D9F60;font-weight:600}
.ct-blue{color:#2E78B8;font-weight:600}
.ct-purple{color:#8E44AD;font-weight:600}

/* Stations */
.station-filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.station-filter{padding:6px 14px;background:var(--white);border:1px solid var(--border);border-radius:16px;font-size:.85rem;cursor:pointer;color:var(--text-light);transition:.2s;user-select:none}
.station-filter:hover{border-color:var(--brand);color:var(--brand)}
.station-filter.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.station-search{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:.95rem;margin-bottom:12px;outline:none;font-family:inherit}
.station-search:focus{border-color:var(--brand)}
.table-wrap{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow-x:auto;-webkit-overflow-scrolling:touch}
.station-table{width:100%;border-collapse:collapse;font-size:.9rem;min-width:700px}
.station-table th{background:var(--brand);color:#fff;padding:10px 12px;text-align:left;font-weight:600;position:sticky;top:0;white-space:nowrap}
.station-table td{padding:10px 12px;border-bottom:1px solid var(--border)}
.station-table tr:hover{background:var(--brand-bg)}
.line-tag{display:inline-block;padding:2px 10px;border-radius:12px;font-size:.8rem;font-weight:600;white-space:nowrap;color:#fff}
.line-жқҝеҚ—з·ҡ{background:#1E4A8C}.line-ж·Ўж°ҙдҝЎзҫ©з·ҡ{background:#C8102E}.line-жқҫеұұж–°еә—з·ҡ{background:#2E8B3C}.line-дёӯе’Ңж–°иҳҶз·ҡ{background:#E8A300}.line-ж–Үж№–з·ҡ{background:#8B5A2B}.line-й«ҳйӣ„жҚ·йҒӢзҙ…з·ҡ{background:#E30613}.line-й–ҖеёӮYTM{background:#555}

.empty-state{text-align:center;padding:40px 20px;color:var(--text-light)}
.empty-state .big{font-size:3rem;margin-bottom:10px}

/* Modal */
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;justify-content:center;align-items:flex-start;padding:20px;overflow-y:auto}
.modal.show{display:flex}
.modal-content{background:#fff;border-radius:var(--radius);max-width:900px;width:100%;max-height:calc(100vh - 40px);display:flex;flex-direction:column;box-shadow:0 10px 40px rgba(0,0,0,.3)}
.modal-header{padding:18px 20px;display:flex;justify-content:space-between;align-items:center;background:var(--brand);color:#fff;border-radius:var(--radius) var(--radius) 0 0}
.modal-header h2{font-size:1.1rem}
.modal-close{background:rgba(255,255,255,.2);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:1.2rem;cursor:pointer}
.modal-body{padding:20px;overflow-y:auto;flex:1}

.login-form{text-align:center;padding:20px}
.login-form input{width:100%;padding:12px;font-size:1rem;border:1px solid var(--border);border-radius:8px;margin:10px 0;outline:none;font-family:inherit}
.login-form input:focus{border-color:var(--brand)}
.btn-primary{background:var(--brand);color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:.95rem;cursor:pointer;font-weight:600;transition:.2s;font-family:inherit}
.btn-primary:hover{background:var(--brand-dark)}
.btn-secondary{background:var(--border);color:var(--text);border:none;padding:10px 20px;border-radius:8px;font-size:.95rem;cursor:pointer;margin-right:8px;font-family:inherit}

.admin-tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:2px solid var(--border);overflow-x:auto}
.admin-tab{padding:10px 14px;border:none;background:none;cursor:pointer;color:var(--text-light);font-weight:600;white-space:nowrap;border-bottom:3px solid transparent;margin-bottom:-2px;font-family:inherit;font-size:.9rem}
.admin-tab.active{color:var(--brand);border-bottom-color:var(--brand)}
.admin-toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.admin-toolbar input,.admin-toolbar select{padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:.9rem}
.admin-list{max-height:50vh;overflow-y:auto;border:1px solid var(--border);border-radius:8px}
.admin-item{padding:12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.admin-item:last-child{border-bottom:none}
.admin-item-info{flex:1;min-width:0}
.admin-item-title{font-weight:600;color:var(--text);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis}
.admin-item-meta{font-size:.8rem;color:var(--text-light)}
.admin-btn{padding:6px 12px;border:none;border-radius:6px;font-size:.85rem;cursor:pointer;font-weight:500;font-family:inherit}
.admin-btn-edit{background:#E3F2FD;color:#1976D2}
.admin-btn-del{background:#FFEBEE;color:#C62828}
.admin-btn-edit:hover{background:#BBDEFB}
.admin-btn-del:hover{background:#FFCDD2}

.form-group{margin-bottom:16px}
.form-group label{display:block;font-weight:600;margin-bottom:6px;color:var(--text);font-size:.9rem}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:.95rem;outline:none;font-family:inherit}
.form-group textarea{min-height:150px;resize:vertical;line-height:1.6}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--brand)}

.icon-picker{display:grid;grid-template-columns:repeat(auto-fill,minmax(46px,1fr));gap:6px;max-height:260px;overflow-y:auto;padding:10px;border:1px solid var(--border);border-radius:8px;background:#FAFAFA}
.icon-option{font-size:1.5rem;padding:8px;text-align:center;cursor:pointer;border-radius:6px;background:#fff;border:2px solid transparent;transition:.15s}
.icon-option:hover{border-color:var(--brand-light)}
.icon-option.selected{border-color:var(--brand);background:var(--brand-bg)}

.export-section{background:var(--brand-bg);padding:16px;border-radius:8px;margin-top:16px;border:1px solid var(--brand-light)}
.export-section h3{color:var(--brand);margin-bottom:8px;font-size:1rem}
.export-section p{font-size:.85rem;color:var(--text-light);margin-bottom:10px}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--text);color:#fff;padding:12px 24px;border-radius:25px;font-size:.9rem;box-shadow:0 4px 20px rgba(0,0,0,.2);z-index:2000;opacity:0;transition:.3s;max-width:90%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
body.fs-large{--fs:18px}body.fs-xlarge{--fs:20px}
.scroll-top{position:fixed;bottom:20px;right:20px;width:44px;height:44px;background:var(--brand);color:#fff;border:none;border-radius:50%;font-size:1.2rem;cursor:pointer;box-shadow:0 4px 12px rgba(200,16,46,.3);opacity:0;pointer-events:none;transition:.3s;z-index:50;font-family:inherit}
.scroll-top.show{opacity:1;pointer-events:auto}

/* Categoryз®ЎзҗҶеҝ«йҖҹжҢүйҲ•(admin) */
.cat-manage-btn{display:none;margin-left:8px;background:var(--brand);color:#fff;border:none;padding:4px 10px;border-radius:14px;font-size:.75rem;cursor:pointer;vertical-align:middle;font-family:inherit}
body.admin-mode .cat-manage-btn{display:inline-block}
</style>
</head>

<script>
let DATA=null,currentCategory='all',isAdmin=false;
const ADMIN_PASSWORD='1234';
const ICONS=['рҹҸў','рҹҺӮ','рҹ’і','рҹҺҒ','рҹҸӘ','рҹҢҗ','рҹ’°','рҹ“Қ','рҹ“ў','рҹӣҚпёҸ','рҹҺҜ','вӯҗ','рҹ”Ҙ','рҹ’Һ','рҹҺҠ','рҹҺү','рҹ“қ','рҹ“Ӣ','рҹ“Ҡ','рҹ“Ҳ','рҹ“Ң','рҹ“һ','рҹ“ұ','рҹ’¬','рҹҡЁ','вҡ пёҸ','рҹ”’','рҹ”‘','вң…','вқҢ','вқ“','вқ—','рҹҡҖ','вңЁ','рҹ’Ў','рҹҺ“','рҹ“ҡ','рҹ“–','рҹ”§','вҡҷпёҸ','рҹҚ°','рҹҚ®','рҹ§Ғ','рҹҚӘ','рҹҚ«','рҹҚө','рҹҘҗ','рҹҘ–','рҹҡҡ','рҹҸғ','рҹҺҲ','рҹҺҖ','рҹ’қ','рҹӣ’','рҹҸҶ','рҹҢҹ'];

window.addEventListener('DOMContentLoaded',init);

async function init(){
  try{
    const local=localStorage.getItem('ytm_qa_data');
    if(local){try{DATA=JSON.parse(local)}catch(e){DATA=await loadJson()}}
    else DATA=await loadJson();
    renderAll();silentCheck();
  }catch(e){
    document.getElementById('resultContainer').innerHTML='<div class="empty-state"><div class="big">вҡ пёҸ</div><p>з„Ўжі•ијүе…ҘиіҮж–ҷпјҢи«ӢзўәиӘҚ data.json</p><p style="font-size:.85rem;margin-top:8px">'+e.message+'</p></div>';
  }
  document.getElementById('searchInput').addEventListener('input',onSearch);
  window.addEventListener('scroll',()=>{document.getElementById('scrollTop').classList.toggle('show',scrollY>300)});
  // жүӢж©ҹзүҲ sidebar й»һж“Ҡж”¶еҗҲ
  document.querySelector('.sidebar-header')?.addEventListener('click',()=>{
    if(window.innerWidth<=900)document.getElementById('sidebarPanel')?.classList.toggle('collapsed');
  });
}

async function loadJson(){const r=await fetch('data.json?t='+Date.now());if(!r.ok)throw new Error('ијүе…ҘеӨұж•—');return r.json()}

// Update check
async function silentCheck(){try{const s=await loadJson();if(s.meta.lastUpdate&&s.meta.lastUpdate>(DATA.meta.lastUpdate||'')&&localStorage.getItem('ytm_qa_data')){window._pu=s;document.getElementById('updateBanner').classList.add('show')}}catch(e){}}
async function checkUpdate(){showToast('жӘўжҹҘдёӯ...');try{const s=await loadJson();if(!localStorage.getItem('ytm_qa_data')){DATA=s;renderAll();showToast('е·ІжҳҜжңҖж–°');return}if(s.meta.lastUpdate&&s.meta.lastUpdate>(DATA.meta.lastUpdate||'')){window._pu=s;document.getElementById('updateBanner').classList.add('show');showToast('зҷјзҸҫж–°зүҲжң¬пјҒ')}else showToast('е·ІжҳҜжңҖж–°')}catch(e){showToast('жӘўжҹҘеӨұж•—')}}
function applyUpdate(){if(!window._pu)return;if(!confirm('еҘ—з”Ёж–°зүҲжң¬е°ҮиҰҶи“Ӣжҡ«еӯҳпјҢзўәе®ҡпјҹ'))return;DATA=window._pu;window._pu=null;localStorage.removeItem('ytm_qa_data');document.getElementById('updateBanner').classList.remove('show');renderAll();showToast('е·Іжӣҙж–°')}

// Render
function renderAll(){
  document.getElementById('headerTitle').textContent=DATA.meta.title||'дәһе°је…ӢYTMе®ўжңҚеҠ©жүӢ';
  let c='';
  c+=`<div>рҹ“һ <strong>е®ўжңҚ</strong>${DATA.meta.subtitle||''}</div>`;
  if(DATA.meta.email)c+=`<div>рҹ“§ <strong>дҝЎз®ұ</strong>${DATA.meta.email}</div>`;
  if(DATA.meta.lineId)c+=`<div>рҹ’¬ <strong>LINE</strong>${DATA.meta.lineId}${DATA.meta.ytmLineId?'пҪңYTM:'+DATA.meta.ytmLineId:''}</div>`;
  document.getElementById('headerContact').innerHTML=c;
  document.getElementById('marqueeText').textContent=DATA.marquee||'';
  renderCategories();renderQA();
}

function renderCategories(){
  const box=document.getElementById('categoryContainer');
  let h=`<div class="category-card ${currentCategory==='all'?'active':''}" onclick="selectCategory('all')"><span class="icon">рҹ“ҡ</span><div class="name">е…ЁйғЁ</div><div class="count">${DATA.qa.length}</div></div>`;
  DATA.categories.forEach(c=>{
    const n=c.id==='station'?(DATA.stations?.length||0):DATA.qa.filter(q=>q.category===c.id).length;
    h+=`<div class="category-card ${currentCategory===c.id?'active':''}" onclick="selectCategory('${c.id}')"><span class="icon">${c.icon}</span><div class="name">${esc(c.name)}</div><div class="count">${n}</div></div>`;
  });
  box.innerHTML=h;
}

function selectCategory(id){currentCategory=id;document.getElementById('searchInput').value='';document.getElementById('searchClear').classList.remove('show');renderCategories();renderQA();scrollTo({top:0,behavior:'smooth'});if(window.innerWidth<=900)document.getElementById('sidebarPanel')?.classList.add('collapsed')}

function renderQA(){
  const kw=document.getElementById('searchInput').value.trim().toLowerCase();
  const ct=document.getElementById('resultContainer');
  if(currentCategory==='station'){renderStations();return}
  let list=DATA.qa;
  if(currentCategory!=='all')list=list.filter(q=>q.category===currentCategory);
  if(kw)list=list.filter(q=>q.title.toLowerCase().includes(kw)||q.content.toLowerCase().includes(kw)||(q.tags||[]).some(t=>t.toLowerCase().includes(kw)));
  let sr=[];
  if(kw&&DATA.stations)sr=DATA.stations.filter(s=>s.name.toLowerCase().includes(kw)||(s.address||'').toLowerCase().includes(kw)||(s.line||'').toLowerCase().includes(kw)||(s.exit||'').toLowerCase().includes(kw)||(s.code||'').toLowerCase().includes(kw));
  if(!list.length&&!sr.length){ct.innerHTML='<div class="empty-state"><div class="big">рҹ”Қ</div><p>жүҫдёҚеҲ°зӣёй—ңиіҮж–ҷ</p></div>';return}
  let h='';
  if(list.length){
    const title=kw?`жҗңе°ӢзөҗжһңпјҡгҖҢ${esc(kw)}гҖҚ`:currentCategory==='all'?'е…ЁйғЁ QA':DATA.categories.find(c=>c.id===currentCategory)?.name||'';
    h+=`<div class="section-title">${title}<span class="count-badge">${list.length} еүҮ</span><button class="cat-manage-btn" onclick="openAdmin();setTimeout(()=>showAdminTab('category'),100)">рҹ“Ӯ з®ЎзҗҶеҲҶйЎһ</button></div>`;
    h+='<div class="qa-list">';
    list.forEach(q=>h+=renderCard(q,kw));
    h+='</div>';
  }
  if(sr.length){h+=`<div class="section-title">рҹ“Қ зӣёй—ңж“ҡй»һ<span class="count-badge">${sr.length} з«ҷ</span></div>`+renderStationTable(sr)}
  ct.innerHTML=h;
}

function renderCard(q,kw){
  const cat=DATA.categories.find(c=>c.id===q.category);
  let badges='';
  if(q.urgent)badges+='<span class="badge badge-urgent">рҹҡЁ з·ҠжҖҘ</span>';
  if(q.internal)badges+='<span class="badge badge-internal">рҹ”’ е…§йғЁ</span>';
  const content=fmt(q.content);
  const titleHl=kw?hl(q.title,kw):esc(q.title);
  let tags='';
  if(q.tags&&q.tags.length)tags='<div class="qa-tags">'+q.tags.map(t=>`<span class="tag">#${esc(t)}</span>`).join('')+'</div>';
  return `<div class="qa-card" data-id="${q.id}">
    <div class="qa-admin-btns">
      <button onclick="event.stopPropagation();moveQA(${q.id},-1)" title="дёҠз§»">в¬Ҷ</button>
      <button onclick="event.stopPropagation();moveQA(${q.id},1)" title="дёӢз§»">в¬Ү</button>
      <button onclick="event.stopPropagation();inlineEdit(${q.id})" title="з·ЁијҜ">вңҸпёҸ</button>
    </div>
    <div class="qa-header" onclick="toggleQA(${q.id})">

// QA жҺ’еәҸ
function moveQA(id,dir){
  const idx=DATA.qa.findIndex(q=>q.id===id);if(idx<0)return;
  // еҰӮжһңеңЁеҲҶйЎһжЁЎејҸпјҢеҸӘеңЁеҗҢеҲҶйЎһе…§жҺ’еәҸ
  if(currentCategory!=='all'){
    const sameCat=DATA.qa.filter(q=>q.category===currentCategory);
    const catIdx=sameCat.findIndex(q=>q.id===id);
    const targetCatIdx=catIdx+dir;
    if(targetCatIdx<0||targetCatIdx>=sameCat.length)return;
    const targetId=sameCat[targetCatIdx].id;
    const globalIdx=DATA.qa.findIndex(q=>q.id===id);
    const globalTargetIdx=DATA.qa.findIndex(q=>q.id===targetId);
    [DATA.qa[globalIdx],DATA.qa[globalTargetIdx]]=[DATA.qa[globalTargetIdx],DATA.qa[globalIdx]];
  } else {
    const j=idx+dir;if(j<0||j>=DATA.qa.length)return;
    [DATA.qa[idx],DATA.qa[j]]=[DATA.qa[j],DATA.qa[idx]];
  }
  saveLocal();renderQA();
}

// Editor helpers
function wrapSel(taId,color){
  const ta=document.getElementById(taId);if(!ta)return;
  const s=ta.selectionStart,e=ta.selectionEnd;
  if(s===e){showToast('и«Ӣе…ҲйҒёеҸ–иҰҒеҘ—з”Ёзҡ„ж–Үеӯ—');return}
  const sel=ta.value.slice(s,e);
  ta.value=ta.value.slice(0,s)+`[[${color}:${sel}]]`+ta.value.slice(e);
  ta.focus();
  const np=s+`[[${color}:${sel}]]`.length;
  ta.setSelectionRange(np,np);
}
function doInsertImg(taId){
  // зӣҙжҺҘи§ёзҷјжӘ”жЎҲйҒёж“Ү
  let fileInput=document.getElementById(taId.replace('ie_content_','ie_imgfile_'));
  if(!fileInput){fileInput=document.getElementById('nq_imgfile')}
  if(fileInput)fileInput.click();
}
function doImgFile(input,taId){
  const f=input.files[0];if(!f)return;
  showToast('ең–зүҮиҷ•зҗҶдёӯ...');
  const img=new Image();
  const reader=new FileReader();
  reader.onload=e=>{
    img.onload=()=>{
      // иҮӘеӢ•зё®ж”ҫеҲ° 800px д»Ҙе…§
      let w=img.width,h=img.height;
      const maxDim=800;
      if(w>maxDim||h>maxDim){
        if(w>h){h=Math.round(h*maxDim/w);w=maxDim}
        else{w=Math.round(w*maxDim/h);h=maxDim}
      }
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      // JPEG еЈ“зё®пјҢе“ҒиіӘ 70%
      const result=canvas.toDataURL('image/jpeg',0.7);
      const ta=document.getElementById(taId);
      const pos=ta.selectionStart||ta.value.length;
      ta.value=ta.value.slice(0,pos)+'\n[[img:'+result+']]\n'+ta.value.slice(pos);
      const kb=Math.round(result.length/1370);
      showToast('ең–зүҮе·ІжҸ’е…ҘпјҲ'+kb+'KBпјү');
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(f);input.value='';
}
function doInsertVideo(taId){
  const url=prompt('и«ӢиІјдёҠеҪұзүҮз¶ІеқҖпјҲYouTube / Vimeo / mp4пјүпјҡ');if(!url)return;
  const ta=document.getElementById(taId);const pos=ta.selectionStart||ta.value.length;
  ta.value=ta.value.slice(0,pos)+'\n[[video:'+url.trim()+']]\n'+ta.value.slice(pos);showToast('еҪұзүҮе·ІжҸ’е…Ҙ');
}
function doInsertLink(taId){

// Format
function esc(s){return s==null?'':String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function fmt(c){
  if(!c)return'';let s=esc(c);
  s=s.replace(/\[\[red:(.*?)\]\]/g,'<span class="ct-red">$1</span>');
  s=s.replace(/\[\[orange:(.*?)\]\]/g,'<span class="ct-orange">$1</span>');
  s=s.replace(/\[\[green:(.*?)\]\]/g,'<span class="ct-green">$1</span>');
  s=s.replace(/\[\[blue:(.*?)\]\]/g,'<span class="ct-blue">$1</span>');
  s=s.replace(/\[\[purple:(.*?)\]\]/g,'<span class="ct-purple">$1</span>');
  s=s.replace(/\[\[link:(.*?)\|(.*?)\]\]/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  s=s.replace(/\[\[img:(.*?)\]\]/g,'<img src="$1" alt="ең–зүҮ">');
  s=s.replace(/\[\[video:(.*?)\]\]/g,(m,u)=>{u=u.trim();const yt=u.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]+)/);if(yt)return`<div class="video-wrap"><iframe src="https://www.youtube.com/embed/${yt[1]}" allowfullscreen></iframe></div>`;const vm=u.match(/vimeo\.com\/(\d+)/);if(vm)return`<div class="video-wrap"><iframe src="https://player.vimeo.com/video/${vm[1]}" allowfullscreen></iframe></div>`;if(/\.(mp4|webm|ogg)(\?|$)/i.test(u))return`<div class="video-wrap"><video controls src="${u}"></video></div>`;return`<a href="${u}" target="_blank">рҹҺҘ ${u}</a>`});
  s=s.replace(/(^|[^"'>=\/])(https?:\/\/[^\s<]+)/g,'$1<a href="$2" target="_blank" rel="noopener">$2</a>');
  return s;
}
function hl(t,kw){if(!kw)return esc(t);const s=esc(t),k=esc(kw);return s.replace(new RegExp('('+k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark style="background:#FFE58F;padding:0 2px;border-radius:2px">$1</mark>')}

function pickIcon(el){document.querySelectorAll('.icon-option').forEach(o=>o.classList.remove('selected'));el.classList.add('selected');document.getElementById('iconPv').textContent=el.dataset.icon;document.getElementById('iconCustom').value=''}
function saveCat(isNew){
  const name=document.getElementById('catName').value.trim(),idVal=document.getElementById('catId').value.trim();
  const custom=document.getElementById('iconCustom').value.trim(),selected=document.querySelector('.icon-option.selected')?.dataset.icon;
  const icon=custom||selected||'рҹ“ў';
  if(!name){showToast('еҗҚзЁұдёҚеҸҜз©әзҷҪ');return}
  if(!idVal||!/^[a-zA-Z0-9_]+$/.test(idVal)){showToast('ID еҸӘиғҪз”ЁиӢұж–Ү/ж•ёеӯ—/еә•з·ҡ');return}
  if(isNew){if(DATA.categories.find(x=>x.id===idVal)){showToast('ID е·ІеӯҳеңЁ');return}DATA.categories.push({id:idVal,name,icon})}
  else{const c=DATA.categories.find(x=>x.id===idVal);c.name=name;c.icon=icon}
  saveLocal();showToast('е·Іе„Іеӯҳ');showAdminTab('category',document.querySelector('.admin-tab.active'));renderAll();
}
function delCat(id){const c=DATA.categories.find(x=>x.id===id);if(!c)return;const n=DATA.qa.filter(q=>q.category===id).length;if(n>0){alert(`йӮ„жңү ${n} еүҮ QAпјҢи«Ӣе…Ҳз§»еҲ°е…¶д»–еҲҶйЎһ`);return}if(!confirm(`еҲӘйҷӨгҖҢ${c.name}гҖҚпјҹ`))return;DATA.categories=DATA.categories.filter(x=>x.id!==id);saveLocal();showToast('е·ІеҲӘйҷӨ');renderCatList();renderAll()}

// ---- ж–°еўһ QA (еҫҢеҸ°) ----

    <div class="form-group"><label>еҲҶйЎһ</label><select id="nq_cat">${catOptions}</select></div>
    <div class="form-group"><label>жЁҷйЎҢ</label><input type="text" id="nq_title" placeholder="ијёе…ҘжЁҷйЎҢ"></div>
    <div class="form-group"><label>е…§е®№</label>
    <div class="edit-toolbar">
      <button type="button" class="tool-btn c-red" onclick="wrapSel('nq_content','red')">рҹ”ҙ зҙ…</button>
      <button type="button" class="tool-btn c-orange" onclick="wrapSel('nq_content','orange')">рҹҹ  ж©ҳ</button>
      <button type="button" class="tool-btn c-green" onclick="wrapSel('nq_content','green')">рҹҹў з¶ </button>
      <button type="button" class="tool-btn c-blue" onclick="wrapSel('nq_content','blue')">рҹ”ө и—Қ</button>
      <button type="button" class="tool-btn c-purple" onclick="wrapSel('nq_content','purple')">рҹҹЈ зҙ«</button>
      <div class="tool-sep"></div>
      <button type="button" class="tool-btn" onclick="doInsertImg('nq_content')">рҹ“· ең–зүҮ</button>
      <button type="button" class="tool-btn" onclick="doInsertVideo('nq_content')">рҹҺҘ еҪұзүҮ</button>
      <button type="button" class="tool-btn" onclick="doInsertLink('nq_content')">рҹ”— йҖЈзөҗ</button>
      <input type="file" id="nq_imgfile" accept="image/*" style="display:none" onchange="doImgFile(this,'nq_content')">
    </div>
    <textarea class="edit-textarea" id="nq_content" placeholder="ијёе…Ҙе…§е®№... йҒёеҸ–ж–Үеӯ—еҫҢй»һйЎҸиүІжҢүйҲ•еҘ—з”ЁиүІеҪ©"></textarea></div>
    <div class="form-group"><label>жЁҷзұӨпјҲйҖ—иҷҹеҲҶйҡ”пјү</label><input type="text" id="nq_tags" placeholder="й—ңйҚөеӯ—1, й—ңйҚөеӯ—2"></div>
    <div class="edit-check" style="margin-bottom:12px"><label><input type="checkbox" id="nq_urgent"> рҹҡЁ з·ҠжҖҘ</label><label><input type="checkbox" id="nq_internal"> рҹ”’ е…§йғЁ</label></div>
    <button class="btn-primary" onclick="saveNewQA()">рҹ’ҫ е„Іеӯҳж–°еўһ</button>`;
}
function saveNewQA(){
  const title=document.getElementById('nq_title').value.trim(),content=document.getElementById('nq_content').value.trim();
  if(!title||!content){showToast('жЁҷйЎҢиҲҮе…§е®№дёҚеҸҜз©әзҷҪ');return}
  const newId=Math.max(0,...DATA.qa.map(x=>x.id))+1;
  const q={id:newId,category:document.getElementById('nq_cat').value,title,content,tags:document.getElementById('nq_tags').value.split(',').map(s=>s.trim()).filter(Boolean)};
  if(document.getElementById('nq_urgent').checked)q.urgent=true;
  if(document.getElementById('nq_internal').checked)q.internal=true;
  DATA.qa.push(q);saveLocal();renderAll();showToast('е·Іж–°еўһпјҒ');
  document.getElementById('nq_title').value='';document.getElementById('nq_content').value='';document.getElementById('nq_tags').value='';
}

// ---- ж“ҡй»һз®ЎзҗҶ ----
function renderStAdmin(){
  setTimeout(renderStList,0);
  return`<div class="admin-toolbar"><button class="btn-primary" onclick="editSt(null)">вһ• ж–°еўһж“ҡй»һ</button><input type="text" id="stSearch" placeholder="жҗңе°Ӣз«ҷеҗҚ..." style="flex:1" oninput="renderStList()"></div><div class="admin-list" id="stList"></div>`;
}
function renderStList(){
  const kw=(document.getElementById('stSearch')?.value||'').toLowerCase();
  let list=DATA.stations||[];
  if(kw)list=list.filter(s=>s.name.toLowerCase().includes(kw)||(s.line||'').toLowerCase().includes(kw));
  document.getElementById('stList').innerHTML=list.map((s,i)=>`<div class="admin-item"><div class="admin-item-info"><div class="admin-item-title">${esc(s.name)}</div><div class="admin-item-meta">${esc(s.line||'')} пҪң ${esc(s.address||'')}</div></div><button class="admin-btn admin-btn-edit" onclick="moveStation(${s.id},-1)" title="дёҠз§»">в¬Ҷ</button><button class="admin-btn admin-btn-edit" onclick="moveStation(${s.id},1)" title="дёӢз§»">в¬Ү</button><button class="admin-btn admin-btn-edit" onclick="editSt(${s.id})">з·ЁијҜ</button><button class="admin-btn admin-btn-del" onclick="delSt(${s.id})">еҲӘйҷӨ</button></div>`).join('')||'<div style="padding:20px;text-align:center;color:var(--text-light)">жІ’жңүиіҮж–ҷ</div>';
}
function moveStation(id,dir){
  const idx=DATA.stations.findIndex(s=>s.id===id);if(idx<0)return;
  const j=idx+dir;if(j<0||j>=DATA.stations.length)return;
  [DATA.stations[idx],DATA.stations[j]]=[DATA.stations[j],DATA.stations[idx]];
  saveLocal();renderStList();renderAll();
}
function editSt(id){
  const s=id?DATA.stations.find(x=>x.id===id):{id:null,name:'',line:'',address:'',exit:'',phone:''};
  const lines=[...new Set(DATA.stations.map(x=>x.line))].filter(Boolean);
  document.getElementById('adminTabContent').innerHTML=`
    <button class="btn-secondary" onclick="showAdminTab('station',document.querySelector('.admin-tab.active'))">вҶҗ иҝ”еӣһ</button>
    <h3 style="margin:16px 0">${id?'вңҸпёҸ з·ЁијҜж“ҡй»һ':'вһ• ж–°еўһж“ҡй»һ'}</h3>
    <div class="form-group"><label>з«ҷеҗҚ / й–ҖеёӮеҗҚзЁұ *</label><input type="text" id="st_name" value="${esc(s.name||'')}"></div>
    <div class="form-group"><label>жҚ·йҒӢз·ҡ / йЎһеҲҘ</label><input type="text" id="st_line" list="dl_line" value="${esc(s.line||'')}" placeholder="дҫӢпјҡжқҝеҚ—з·ҡгҖҒй«ҳйӣ„жҚ·йҒӢзҙ…з·ҡгҖҒй–ҖеёӮ YTM"><datalist id="dl_line">${lines.map(l=>`<option value="${esc(l)}">`).join('')}</datalist></div>
    <div class="form-group"><label>ең°еқҖ</label><input type="text" id="st_addr" value="${esc(s.address||'')}"></div>
    <div class="form-group"><label>дҪҚзҪ®/еҮәеҸЈ</label><input type="text" id="st_exit" value="${esc(s.exit||'')}"></div>
    <div class="form-group"><label>йӣ»и©ұ</label><input type="text" id="st_phone" value="${esc(s.phone||'')}" placeholder="дҫӢпјҡ(02) 2657-4837"></div>
    <div style="margin-top:20px"><button class="btn-secondary" onclick="showAdminTab('station',document.querySelector('.admin-tab.active'))">еҸ–ж¶Ҳ</button><button class="btn-primary" onclick="saveSt(${id||'null'})">рҹ’ҫ е„Іеӯҳ</button></div>`;
}
function saveSt(id){
  const name=document.getElementById('st_name').value.trim();if(!name){showToast('з«ҷеҗҚдёҚеҸҜз©әзҷҪ');return}
  const d={name,line:document.getElementById('st_line').value.trim(),address:document.getElementById('st_addr').value.trim(),exit:document.getElementById('st_exit').value.trim(),phone:document.getElementById('st_phone').value.trim()};
  if(id){Object.assign(DATA.stations.find(x=>x.id===id),d)}else{const nid=Math.max(0,...DATA.stations.map(x=>x.id))+1;DATA.stations.push({id:nid,...d})}
  saveLocal();showToast('е·Іе„Іеӯҳ');showAdminTab('station',document.querySelector('.admin-tab.active'));renderAll();
}
function delSt(id){const s=DATA.stations.find(x=>x.id===id);if(!s||!confirm(`еҲӘйҷӨгҖҢ${s.name}гҖҚпјҹ`))return;DATA.stations=DATA.stations.filter(x=>x.id!==id);saveLocal();showToast('е·ІеҲӘйҷӨ');renderStList();renderAll()}

// ---- еҹәжң¬иЁӯе®ҡ ----
function renderMetaAdmin(){
  return`<h3 style="margin-bottom:16px">вҡҷпёҸ еҹәжң¬иЁӯе®ҡ</h3>
    <div class="form-group"><label>з¶Із«ҷжЁҷйЎҢ</label><input type="text" id="m_title" value="${esc(DATA.meta.title||'')}"></div>
    <div class="form-group"><label>е®ўжңҚйӣ»и©ұ</label><input type="text" id="m_sub" value="${esc(DATA.meta.subtitle||'')}"></div>
    <div class="form-group"><label>е®ўжңҚдҝЎз®ұ</label><input type="text" id="m_email" value="${esc(DATA.meta.email||'')}"></div>
    <div class="form-group"><label>е®ҳж–№ LINE ID</label><input type="text" id="m_line" value="${esc(DATA.meta.lineId||'')}"></div>
    <div class="form-group"><label>YTM LINE ID</label><input type="text" id="m_ytmline" value="${esc(DATA.meta.ytmLineId||'')}"></div>
    <div class="form-group"><label>и·‘йҰ¬зҮҲ</label><textarea id="m_marquee" rows="3">${esc(DATA.marquee||'')}</textarea></div>
    <div class="form-group"><label>зүҲжң¬</label><input type="text" id="m_ver" value="${esc(DATA.meta.version||'')}"></div>
    <div style="margin-top:20px"><button class="btn-primary" onclick="saveMeta()">рҹ’ҫ е„Іеӯҳ</button></div>`;
}
function saveMeta(){
  DATA.meta.title=document.getElementById('m_title').value.trim();
  DATA.meta.subtitle=document.getElementById('m_sub').value.trim();
  DATA.meta.email=document.getElementById('m_email').value.trim();
  DATA.meta.lineId=document.getElementById('m_line').value.trim();
  DATA.meta.ytmLineId=document.getElementById('m_ytmline').value.trim();
  DATA.meta.version=document.getElementById('m_ver').value.trim();
  DATA.marquee=document.getElementById('m_marquee').value.trim();
  saveLocal();showToast('е·Іе„Іеӯҳ');renderAll();
}

// ---- еҢҜе…Ҙ/еҢҜеҮә ----
function renderExportAdmin(){
  return`
    <div class="export-section"><h3>рҹ’ҫ еҢҜеҮә data.json</h3><p>дёӢијүеҫҢдёҠеӮіеҲ° GitHub иҰҶи“ӢеҺҹжӘ”пјҢе…¶д»–дәәе°ұиғҪзңӢеҲ°жңҖж–°е…§е®№</p><button class="btn-primary" onclick="exportData()">в¬ҮпёҸ дёӢијү data.json</button></div>
    <div class="export-section" style="background:#E3F2FD;border-color:#90CAF9"><h3 style="color:#1565C0">рҹ“Ө еҢҜе…Ҙ data.json</h3><p>жңғиҰҶи“Ӣзӣ®еүҚжүҖжңүиіҮж–ҷ</p><button class="btn-primary" style="background:#1565C0" onclick="document.getElementById('impFile').click()">в¬ҶпёҸ йҒёж“ҮжӘ”жЎҲ</button><input type="file" id="impFile" accept=".json" style="display:none" onchange="importData(this)"></div>
    <div class="export-section" style="background:#FFF3E0;border-color:#FFB74D"><h3 style="color:#E65100">рҹ”„ еҫһдјәжңҚеҷЁйҮҚж–°ијүе…Ҙ</h3><p>жҚЁжЈ„жң¬ж©ҹжҡ«еӯҳдҝ®ж”№</p><button class="btn-primary" style="background:#E65100" onclick="reloadServer()">йҮҚж–°ијүе…Ҙ</button></div>
    <div class="export-section" style="background:#FFEBEE;border-color:#EF9A9A"><h3 style="color:#C62828">рҹ—‘пёҸ жё…йҷӨжҡ«еӯҳ</h3><p>жё…йҷӨзҖҸиҰҪеҷЁжҡ«еӯҳдёҰзҷ»еҮә</p><button class="btn-primary" style="background:#C62828" onclick="clearAll()">жё…йҷӨ</button></div>
    <div style="margin-top:20px;padding:16px;background:var(--brand-bg);border-radius:8px;font-size:.9rem;color:var(--text-light)"><strong style="color:var(--brand)">рҹ“– йғЁзҪІжөҒзЁӢ</strong><br>1. еүҚеҸ°зӣҙжҺҘй»һ вңҸпёҸ з·ЁијҜ QA / еҫҢеҸ°з®ЎзҗҶеҲҶйЎһ&ж“ҡй»һ<br>2. еҲ°жӯӨеҲҶй ҒдёӢијү data.json<br>3. дёҠеӮі GitHub иҰҶи“ӢеҺҹжӘ”<br>4. е…¶д»–дәәйҮҚж–°ж•ҙзҗҶеҚізңӢеҲ°жӣҙж–°<br><br><strong style="color:var(--brand)">рҹ“Ҡ зөұиЁҲ</strong><br>QAпјҡ${DATA.qa.length} еүҮ пҪң ж“ҡй»һпјҡ${DATA.stations.length} з«ҷ пҪң еҲҶйЎһпјҡ${DATA.categories.length} йЎһ пҪң жӣҙж–°пјҡ${DATA.meta.lastUpdate||'вҖ”'}</div>`;
}
function exportData(){DATA.meta.lastUpdate=new Date().toISOString().split('T')[0];const j=JSON.stringify(DATA,null,2);const b=new Blob([j],{type:'application/json;charset=utf-8'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='data.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);showToast('е·ІдёӢијү')}
function importData(inp){const f=inp.files[0];if(!f)return;if(!confirm('еҢҜе…ҘжңғиҰҶи“ӢжүҖжңүиіҮж–ҷпјҢзўәе®ҡпјҹ')){inp.value='';return}const r=new FileReader();r.onload=e=>{try{const p=JSON.parse(e.target.result);if(!p.qa||!p.categories){showToast('ж јејҸдёҚжӯЈзўә');return}DATA=p;saveLocal();showToast('еҢҜе…ҘжҲҗеҠҹ');renderAll();showAdminTab('export',document.querySelector('.admin-tab.active'))}catch(er){showToast('и§ЈжһҗеӨұж•—')}};r.readAsText(f);inp.value=''}
async function reloadServer(){if(!confirm('жҚЁжЈ„жҡ«еӯҳпјҢзўәе®ҡпјҹ'))return;localStorage.removeItem('ytm_qa_data');try{DATA=await loadJson();showToast('е·ІйҮҚж–°ијүе…Ҙ');renderAll();showAdminTab('export',document.querySelector('.admin-tab.active'))}catch(e){showToast('еӨұж•—')}}
function clearAll(){if(!confirm('жё…йҷӨжҡ«еӯҳдёҰзҷ»еҮәпјҹ'))return;localStorage.removeItem('ytm_qa_data');isAdmin=false;document.body.classList.remove('admin-mode');closeAdmin();showToast('е·Іжё…йҷӨ');location.reload()}

function saveLocal(){DATA.meta.lastUpdate=new Date().toISOString().split('T')[0];try{localStorage.setItem('ytm_qa_data',JSON.stringify(DATA))}catch(e){console.warn('е„ІеӯҳеӨұж•—',e)}}

document.getElementById('adminModal').addEventListener('click',e=>{if(e.target.id==='adminModal')closeAdmin()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeAdmin()});
</script>
